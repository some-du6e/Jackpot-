<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jackpot+</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-header">
      <div class="popup-title">
        <span class="popup-title-icon">🎰</span>
        <span>Jackpot+</span>
      </div>
      <span class="popup-version">v1.0</span>
    </div>

    <div class="popup-body">
      <div class="settings-section">
        <div class="settings-label">Status</div>
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span class="status-text">Active</span>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-label">Hackatime API Key</div>
        <div class="api-key-input">
          <span class="api-key-icon">🔑</span>
          <input
            type="password"
            id="hackatime-api-key"
            placeholder="Hackatime API key"
            autocomplete="off" />
          <button id="save-api-key" class="save-api-key-btn" aria-label="Save API key">✓</button>
        </div>
        <div class="api-key-status" id="api-key-status"></div>
      </div>

      <div class="settings-section">
        <div class="settings-label">Theme</div>
        <div class="theme-options">
          <div
            class="theme-option selected"
            data-theme="plain"
            role="radio"
            aria-checked="true"
            tabindex="0">
            <div class="theme-radio">
              <div class="theme-radio-inner"></div>
            </div>
            <div class="theme-info">
              <div class="theme-name">Plain</div>
              <div class="theme-desc">Clean light interface</div>
            </div>
            <div class="theme-preview theme-preview-plain"></div>
          </div>
          <div
            class="theme-option"
            data-theme="hacker"
            role="radio"
            aria-checked="false"
            tabindex="0">
            <div class="theme-radio">
              <div class="theme-radio-inner"></div>
            </div>
            <div class="theme-info">
              <div class="theme-name">Hacker</div>
              <div class="theme-desc">Terminal green on black</div>
            </div>
            <div class="theme-preview theme-preview-hacker"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="popup-footer">
      <a href="https://jackpot.hackclub.com" target="_blank" class="popup-link">
        jackpot.hackclub.com
      </a>
      <span class="popup-credits">by Hack Club</span>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
