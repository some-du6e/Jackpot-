<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jackpot+ Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-header">
      <div class="popup-title">
        <span class="popup-title-icon">🎰</span>
        Jackpot+
      </div>
      <span class="popup-version">v1.0.0</span>
    </div>

    <div class="popup-body">
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span class="status-text">Extension active</span>
      </div>

      <div class="settings-section">
        <div class="settings-label">Theme</div>
        <div class="theme-options" id="themeOptions">
          <div class="theme-option selected" data-theme="plain">
            <div class="theme-radio">
              <div class="theme-radio-inner"></div>
            </div>
            <div class="theme-info">
              <div class="theme-name">Plain</div>
              <div class="theme-desc">Clean, modern look</div>
            </div>
            <div class="theme-preview theme-preview-plain"></div>
          </div>
          <div class="theme-option" data-theme="hacker">
            <div class="theme-radio">
              <div class="theme-radio-inner"></div>
            </div>
            <div class="theme-info">
              <div class="theme-name">Hacker</div>
              <div class="theme-desc">Terminal green-on-black</div>
            </div>
            <div class="theme-preview theme-preview-hacker"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="popup-footer">
      <a href="https://github.com/some-du6e/Jackpot-" target="_blank" class="popup-link">GitHub</a>
      <span class="popup-footer-text">Made with ❤️ by Karim</span>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
